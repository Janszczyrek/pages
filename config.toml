baseurl = "https://janszczyrek.github.io/pages"
languageCode = "en-us"
theme = "terminal"
pagination.pagerSize = 5

[markup.goldmark.renderer]
  unsafe = true

[params]
  contentTypeName = "posts"
  showMenuItems = 2
  fullWidthTheme = false
  centerTheme = false

[languages]
  [languages.en]
    title = "Janszczyrek Blog"
    description = "This is where I share my journey of experimenting with my personal homelab. In my spare time, I enjoy exploring new technologies, tinkering with hardware and software setups, and documenting the lessons learned along the way. Whether it's self-hosted services, network configurations, or automation projects, you'll find a growing collection of hands-on insights and real-world setups here."
    keywords = ""
    copyright = ""
    menuMore = "Show more"
    readMore = "Read more"
    readOtherPosts = "Read other posts"

    [languages.en.params.logo]
      logoText = "Terminal"
      logoHomeLink = "/"

    [languages.en.menu]
      [[languages.en.menu.main]]
        identifier = "about"
        name = "About"
        url = "/about"
      [[languages.en.menu.main]]
        identifier = "github"
        name = "Github"
        url = "https://github.com/Janszczyrek"
